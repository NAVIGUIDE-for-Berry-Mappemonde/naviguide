stages:
  - test

navsecops_mr:
  stage: test
  image: alpine:3.19
  rules:
    # Run on MR pipelines only. The shell script handles
    # "no .geojson in diff" gracefully (exit 0).
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    # Optional: set per-MR to force a specific file instead of auto-detect.
    NAVSECOPS_ROUTE_FILE: ""
  before_script:
    - apk add --no-cache curl jq git bash
  script:
    - bash scripts/gitlab_mr_navsecops.sh
  artifacts:
    paths:
      - navsecops-response.json
      - navsecops-timing.json
    when: always
    expire_in: 7 days
  allow_failure: false
