stages:
  - test

navsecops_mr:
  stage: test
  image: alpine:3.19
  rules:
    # Run on MR pipelines only. The shell script handles
    # "no .geojson in diff" gracefully (exit 0).
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    # Optional: set per-MR to force a specific file instead of auto-detect.
    NAVSECOPS_ROUTE_FILE: ""
  before_script:
    - apk add --no-cache curl jq git bash
    - touch navsecops-sync-response.json
  script:
    - bash scripts/gitlab_mr_navsecops.sh
  artifacts:
    paths:
      - navsecops-response.json
      - navsecops-timing.json
      - navsecops-sync-response.json
    when: always
    expire_in: 7 days
  allow_failure: false

berry_route_order_validate:
  stage: test
  image: python:3.12-alpine
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - python3 scripts/validate_berry_route_order.py
  allow_failure: false
